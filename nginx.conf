server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index-aurora.html index.html;

    # Serve the landing page for any route
    location / {
        try_files $uri $uri/ /index-aurora.html;
    }

    # Cache static assets
    location ~* \.(?:css|js|png|jpe?g|gif|svg|ico|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    gzip on;
    gzip_types text/css application/javascript image/svg+xml;
}
